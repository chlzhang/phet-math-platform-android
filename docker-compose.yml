services:
  postgres:
    image: postgres:15-alpine
    container_name: phet_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: phet_math
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - phet_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d phet_math"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: phet_redis
    ports:
      - "6380:6379"
    networks:
      - phet_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phet_backend
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/phet_math
      REDIS_URL: redis://redis:6379/0
      TEMPLATES_DIR: /app/simulators/templates
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - ./simulators/templates:/app/simulators/templates:ro
    ports:
      - "8091:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - phet_network
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  nginx:
    image: nginx:alpine
    container_name: phet_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/uni-app/dist/build/h5:/usr/share/nginx/html
      - ./simulators:/usr/share/nginx/html/simulators
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_started
    networks:
      - phet_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  phet_network:
    driver: bridge
