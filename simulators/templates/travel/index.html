<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相遇与追及</title>
  <link rel="stylesheet" href="../../shared/simulator-base.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="mode-tabs" id="modeTabs"></div>
    <div class="controls" id="controls"></div>
    <div class="tip" id="tip">调整速度，播放动画，观察两人何时相遇或追上。</div>
    <div class="main-stage">
      <div class="card">
        <div class="viz-area">
          <div class="travel-track" id="track">
            <div class="meet-point" id="meetPoint"></div>
            <div class="traveler" id="a">🏃</div>
            <div class="traveler b" id="b">🏃‍♀️</div>
          </div>
        </div>
        <div class="controls hidden" id="demoControls"></div>
        <div class="success-msg" id="successMsg"></div>
      </div>
      <div class="side-panel" id="sidePanel"></div>
    </div>
  </div>
  <script src="../../shared/simulator-core.js"></script>
  <script src="simulator.js"></script>
  <script>
    const params = getUrlParams();
    initSimulator(params);
  </script>
</body>
</html>
